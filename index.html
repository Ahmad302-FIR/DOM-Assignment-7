<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Todo List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Todo List</h1>
        
        <div class="input-section">
            <input type="text" id="itemInput" placeholder="Enter a new task..." autocomplete="off">
            <button id="addBtn">Add Item</button>
        </div>

        <!-- Task 1: Empty ul list -->
        <ul id="itemList" class="item-list">
            <!-- Items will be added here dynamically -->
        </ul>

        <div class="footer-section">
            <!-- Task 5: Clear All button -->
            <button id="clearAllBtn" class="clear-btn">Clear All</button>
            
            <!-- Task 6: Item counter paragraph -->
            <p id="itemCounter" class="counter">Total items: 0</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
